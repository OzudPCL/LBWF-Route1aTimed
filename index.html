            text-align: left;

            color: #00997C;

        totalTraffic += row.traffic;
    });

    document.getElementById('total-links').textContent = totalLinks.toLocaleString();
    document.getElementById('total-traffic').textContent = totalTraffic.toLocaleString();

    const toggleBtn = document.getElementById('toggle-table');
    const tableWrapper = document.getElementById('table-wrapper');
    const arrow = document.getElementById('arrow');

    toggleBtn.addEventListener('click', () => {
        const isExpanded = tableWrapper.classList.toggle('expanded');
        arrow.textContent = isExpanded ? '▲' : '▼';
    });

    // Track state for both layers
    let activeRoutes = [
        'Rerouted from Drayton Road', 
        'Rerouted from Hainault Road', 
        'Rerouted from James Lane',
        'Rerouted from Fletcher Lane',
        'Rerouted from Fairlop Road'
    ];

    map.on('load', () => {
        const layer1 = 'lbwf_Route_1a_updated-6mx2re';
        const layer2 = 'additional-1a-routes-apt653';

        document.querySelectorAll('.legend-item').forEach(item => {
            item.addEventListener('click', () => {
                const routeName = item.getAttribute('data-route');
                const index = activeRoutes.indexOf(routeName);

                if (index > -1) {
                    activeRoutes.splice(index, 1);
                    item.classList.add('disabled');
                } else {
                    activeRoutes.push(routeName);
                    item.classList.remove('disabled');
                }

                // Update filters for both layers
                const newFilter = ['any'];
                activeRoutes.forEach(route => {
                    newFilter.push(['has', route]);
                });

                const finalFilter = activeRoutes.length === 0 
                    ? ['==', ['get', 'non-existent'], 'true'] 
                    : newFilter;

                map.setFilter(layer1, finalFilter);
                map.setFilter(layer2, finalFilter);
            });
        });
    });
